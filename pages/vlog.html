<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="../favicon.ico">
  <link rel="icon" type="image/svg+xml" href="../assets/images/favicon.svg">
  <link rel="apple-touch-icon" href="../assets/images/apple-touch-icon.png">
  <title>Video Globe | River Tech Christian School | Post Falls</title>
  <meta name="description" content="Explore River Tech School's video gallery — performances, programs, and school life on an interactive 3D globe. A Christian school of performing arts and technology in Post Falls, Idaho.">

  <meta property="og:title" content="Video Globe | River Tech Christian School">
  <meta property="og:description" content="Explore River Tech School's video gallery on an interactive 3D globe.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://www.rivertechschool.com/assets/images/og-image.png">

  <link rel="canonical" href="https://www.rivertechschool.com/pages/vlog.html">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebPage",
    "name": "Video Globe | River Tech Christian School",
    "url": "https://www.rivertechschool.com/pages/vlog.html",
    "isPartOf": {
      "@type": "WebSite",
      "name": "River Tech School of Performing Arts & Technology",
      "url": "https://www.rivertechschool.com/"
    }
  }
  </script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #020810; font-family: 'Inter', sans-serif; }
    canvas { display: block; touch-action: none; }

    /* ── Back button ── */
    #back-btn {
      position: fixed; top: 16px; left: 16px; z-index: 20;
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(200,215,245,0.8);
      padding: 8px 16px;
      border-radius: 8px;
      text-decoration: none;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.5px;
      transition: background 0.2s, color 0.2s;
    }
    #back-btn:hover { background: rgba(255,255,255,0.15); color: #fff; }
    #back-btn svg { width: 16px; height: 16px; }

    /* ── Loading screen ── */
    #loading {
      position: fixed; inset: 0; z-index: 100;
      background: #020810;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      transition: opacity 0.8s ease;
    }
    #loading.fade-out { opacity: 0; pointer-events: none; }
    .spinner {
      width: 60px; height: 60px;
      border: 3px solid rgba(100,160,255,0.15);
      border-top-color: rgba(100,160,255,0.8);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p {
      margin-top: 20px;
      color: rgba(180,200,240,0.6);
      font-size: 14px;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-family: 'Space Grotesk', sans-serif;
    }

    /* ── Modal overlay ── */
    #modal-overlay {
      position: fixed; inset: 0; z-index: 50;
      background: rgba(2,8,16,0.85);
      display: none; align-items: center; justify-content: center;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    #modal-overlay.active { display: flex; }
    #modal-box {
      background: #0d1525;
      border: 1px solid rgba(100,160,255,0.2);
      border-radius: 16px;
      padding: 0;
      max-width: 680px; width: 92%;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      animation: modal-in 0.3s ease;
      position: relative;
    }
    @keyframes modal-in {
      from { opacity: 0; transform: scale(0.92) translateY(20px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
    #modal-video-wrap {
      width: 100%;
      aspect-ratio: 16/9;
      background: #000;
      position: relative;
    }
    #modal-iframe {
      width: 100%; height: 100%;
      border: none; display: block;
    }
    #modal-content {
      padding: 16px 20px 20px;
    }
    #modal-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 18px;
      font-weight: 600;
      color: #e8edf5;
    }
    #modal-close {
      position: absolute; top: 10px; right: 10px;
      width: 32px; height: 32px;
      background: rgba(0,0,0,0.6);
      border: none; border-radius: 50%;
      color: white; font-size: 18px;
      cursor: pointer; z-index: 2;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    #modal-close:hover { background: rgba(255,255,255,0.2); }

    /* ── Hint text ── */
    #hint {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%);
      color: rgba(180,200,240,0.4);
      font-size: 13px;
      letter-spacing: 1px;
      font-family: 'Space Grotesk', sans-serif;
      pointer-events: none;
      transition: opacity 2s ease;
    }
    #hint.hidden { opacity: 0; }

    /* ── Title ── */
    #globe-title {
      position: fixed; top: 20px; left: 50%;
      transform: translateX(-50%);
      color: rgba(200,215,245,0.7);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 3px;
      text-transform: uppercase;
      pointer-events: none;
      white-space: nowrap;
    }
  </style>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
    }
  }
  </script>
</head>
<body>

<a id="back-btn" href="../index.html">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><polyline points="12 19 5 12 12 5"/></svg>
  Back to Site
</a>

<div id="loading">
  <div class="spinner"></div>
  <p>Loading Globe</p>
</div>

<div id="globe-title">RIVER TECH VIDEO GLOBE</div>

<div id="modal-overlay" onclick="closeModal(event)">
  <div id="modal-box">
    <button id="modal-close" onclick="closeModal(event)">&times;</button>
    <div id="modal-video-wrap">
      <iframe id="modal-iframe" src="" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
    </div>
    <div id="modal-content">
      <div id="modal-title"></div>
    </div>
  </div>
</div>

<div id="hint">Drag to explore &middot; Click a video to watch</div>

<script type="module">
import * as THREE from 'three';

// ── Video Data (25 videos) ──
const videos = [
  { id: "g-w2FclxIqQ", title: "River Tech Is Back" },
  { id: "s0OqHDbP_xk", title: "River Tech Resurrection" },
  { id: "mGWBn2YrBZY", title: "Welcome to River Tech" },
  { id: "-z7ZJb6AhV4", title: "Sports & Fitness" },
  { id: "XkPQBTi2u_4", title: "Fun in the Sun" },
  { id: "3qtvQa-Hdhc", title: "Tax Credit Explained" },
  { id: "sCi_CsAFyVs", title: "Art at River Tech" },
  { id: "j9GBa4AeC5Q", title: "Greatest Showman" },
  { id: "g2M4g9z2XdY", title: "Technology Program" },
  { id: "owF-rTW7nN4", title: "Glorious" },
  { id: "42pwB-Qpt5Y", title: "A Million Dreams" },
  { id: "FSTjK1RCAyM", title: "Refuge" },
  { id: "htIWxqx6Tx8", title: "When You Believe" },
  { id: "L93kChdKr38", title: "Something Just Like This" },
  { id: "-EVawPrd04E", title: "Tomorrow" },
  { id: "Vp99uqCGtjY", title: "Pure Imagination" },
  { id: "NKddVEWeE3c", title: "First Rehearsal" },
  { id: "cuem_L8GHgc", title: "Christmas Is Here" },
  { id: "LAo23pXmfas", title: "Circle of Life" },
  { id: "MkZZgxUHjVo", title: "Behind the Scenes: Annie" },
  { id: "EClDsLzLMjo", title: "Kids Who Cried Wolf" },
  { id: "0gs9RpAQq20", title: "Tortoise and the Hare" },
  { id: "X46Cqn2hq9k", title: "The Jungle Book" },
  { id: "qiRQFHR7JgE", title: "Parent Review" },
  { id: "L8oYhqpN63Q", title: "Amazing Grace" }
];

// ── Fixed 1.6x card size for 25 videos ──
const cardW = 1.92;  // 1.2 * 1.6
const cardH = cardW * 0.625;
const floatHeight = 0.4;
const labelHeight = cardH * 0.28;
const globeRadius = 4.2;

// ── Scene Setup ──
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x020810);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.z = 12;

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.domElement.style.touchAction = 'none';
document.body.appendChild(renderer.domElement);

// ── Lighting ──
scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(5, 3, 5);
scene.add(dirLight);

// ── Stars ──
const starsGeo = new THREE.BufferGeometry();
const starCount = 1500;
const starPos = new Float32Array(starCount * 3);
const starSizes = new Float32Array(starCount);
const starPhases = new Float32Array(starCount);
for (let i = 0; i < starCount; i++) {
  const r = 50 + Math.random() * 150;
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.acos(2 * Math.random() - 1);
  starPos[i*3] = r * Math.sin(phi) * Math.cos(theta);
  starPos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
  starPos[i*3+2] = r * Math.cos(phi);
  starSizes[i] = 0.5 + Math.random() * 2.0;
  starPhases[i] = Math.random() * Math.PI * 2;
}
starsGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
starsGeo.setAttribute('size', new THREE.BufferAttribute(starSizes, 1));
starsGeo.setAttribute('phase', new THREE.BufferAttribute(starPhases, 1));

const starMat = new THREE.ShaderMaterial({
  uniforms: { uTime: { value: 0 } },
  vertexShader: `
    attribute float size;
    attribute float phase;
    uniform float uTime;
    varying float vAlpha;
    void main() {
      vAlpha = 0.4 + 0.6 * (0.5 + 0.5 * sin(uTime * 0.8 + phase));
      vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
      gl_PointSize = size * (200.0 / -mvPos.z);
      gl_Position = projectionMatrix * mvPos;
    }
  `,
  fragmentShader: `
    varying float vAlpha;
    void main() {
      float d = length(gl_PointCoord - 0.5);
      if (d > 0.5) discard;
      float alpha = vAlpha * smoothstep(0.5, 0.1, d);
      gl_FragColor = vec4(0.85, 0.9, 1.0, alpha);
    }
  `,
  transparent: true, depthWrite: false, blending: THREE.AdditiveBlending
});
scene.add(new THREE.Points(starsGeo, starMat));

// ── Earth Globe ──
const textureLoader = new THREE.TextureLoader();
const globeGroup = new THREE.Group();
scene.add(globeGroup);

const earthGeo = new THREE.SphereGeometry(globeRadius, 64, 64);
const earthMat = new THREE.MeshPhongMaterial({
  map: textureLoader.load('../assets/vlog/textures/earth_day.jpg'),
  bumpMap: textureLoader.load('../assets/vlog/textures/earth_topology.png'),
  bumpScale: 0.06,
  specular: new THREE.Color(0x333333),
  shininess: 15
});
globeGroup.add(new THREE.Mesh(earthGeo, earthMat));

// ── Atmosphere rim ──
const atmosGeo = new THREE.SphereGeometry(globeRadius * 1.015, 64, 64);
const atmosMat = new THREE.ShaderMaterial({
  vertexShader: `
    varying vec3 vNormal; varying vec3 vPosition;
    void main() {
      vNormal = normalize(normalMatrix * normal);
      vPosition = (modelViewMatrix * vec4(position, 1.0)).xyz;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    varying vec3 vNormal; varying vec3 vPosition;
    void main() {
      vec3 viewDir = normalize(-vPosition);
      float rim = 1.0 - max(dot(viewDir, vNormal), 0.0);
      gl_FragColor = vec4(0.3, 0.5, 1.0, pow(rim, 3.0) * 0.45);
    }
  `,
  transparent: true, depthWrite: false, side: THREE.FrontSide
});
globeGroup.add(new THREE.Mesh(atmosGeo, atmosMat));

// ── Outer halo ──
const haloGeo = new THREE.SphereGeometry(globeRadius * 1.18, 64, 64);
const haloMat = new THREE.ShaderMaterial({
  vertexShader: `
    varying vec3 vNormal; varying vec3 vPosition;
    void main() {
      vNormal = normalize(normalMatrix * normal);
      vPosition = (modelViewMatrix * vec4(position, 1.0)).xyz;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    varying vec3 vNormal; varying vec3 vPosition;
    void main() {
      vec3 viewDir = normalize(-vPosition);
      float rim = 1.0 - max(dot(viewDir, vNormal), 0.0);
      gl_FragColor = vec4(0.3, 0.5, 1.0, pow(rim, 5.0) * 0.2);
    }
  `,
  transparent: true, depthWrite: false, side: THREE.BackSide
});
globeGroup.add(new THREE.Mesh(haloGeo, haloMat));

// ── Video Cards ──
const cardGroup = new THREE.Group();
globeGroup.add(cardGroup);
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const cardMeshes = [];
let hoveredCard = null;

function createCardTexture(thumbUrl, title) {
  return new Promise((resolve) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      const cw = 512, totalH = 512 + 140;
      const canvas = document.createElement('canvas');
      canvas.width = cw; canvas.height = totalH;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, cw, 512);
      ctx.fillStyle = 'rgba(8, 14, 28, 0.92)';
      ctx.fillRect(0, 512, cw, 140);
      ctx.fillStyle = 'rgba(100, 160, 255, 0.4)';
      ctx.fillRect(0, 512, cw, 2);
      ctx.fillStyle = '#d0daf0';
      ctx.font = '600 32px "Space Grotesk", "Segoe UI", sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      const maxW = cw - 40, words = title.split(' ');
      let lines = [], cur = words[0];
      for (let i = 1; i < words.length; i++) {
        const test = cur + ' ' + words[i];
        if (ctx.measureText(test).width > maxW) { lines.push(cur); cur = words[i]; }
        else cur = test;
      }
      lines.push(cur);
      const lh = 38, startY = 512 + 70 - ((lines.length - 1) * lh / 2);
      lines.forEach((l, i) => ctx.fillText(l, cw / 2, startY + i * lh));
      const tex = new THREE.CanvasTexture(canvas);
      tex.minFilter = THREE.LinearFilter;
      tex.magFilter = THREE.LinearFilter;
      resolve(tex);
    };
    img.onerror = () => {
      const canvas = document.createElement('canvas');
      canvas.width = 512; canvas.height = 652;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#1a2540'; ctx.fillRect(0, 0, 512, 652);
      ctx.fillStyle = '#d0daf0'; ctx.font = '600 32px sans-serif';
      ctx.textAlign = 'center'; ctx.fillText(title, 256, 326);
      resolve(new THREE.CanvasTexture(canvas));
    };
    img.src = thumbUrl;
  });
}

function fibSphere(i, total) {
  const ga = Math.PI * (3 - Math.sqrt(5));
  const y = 1 - (i / (total - 1)) * 2;
  const r = Math.sqrt(1 - y * y);
  const theta = ga * i;
  return new THREE.Vector3(r * Math.cos(theta), y, r * Math.sin(theta));
}

async function buildCards() {
  const totalH = cardH + labelHeight;
  for (let i = 0; i < videos.length; i++) {
    const v = videos[i];
    const tex = await createCardTexture(`../assets/vlog/thumbs/${v.id}.jpg`, v.title);
    const geo = new THREE.PlaneGeometry(cardW, totalH);
    const mat = new THREE.MeshBasicMaterial({ map: tex, transparent: true, side: THREE.DoubleSide, depthWrite: true });
    const mesh = new THREE.Mesh(geo, mat);
    const dir = fibSphere(i, videos.length);
    const pos = dir.clone().multiplyScalar(globeRadius + floatHeight);
    mesh.position.copy(pos);
    // Store the local direction for billboard orientation
    mesh.userData.localDir = dir.clone();
    mesh.userData = { videoId: v.id, title: v.title, targetScale: 1.0 };
    cardGroup.add(mesh);
    cardMeshes.push(mesh);
  }
}

// ── Interaction ──
let isDragging = false, prevMouse = { x: 0, y: 0 };
let rotVel = { x: 0, y: 0 };
const damping = 0.92, autoSpeed = 0.0015;
let lastInteract = 0;
let downPos = { x: 0, y: 0 };

// Use document-level listeners so events aren't lost
function getXY(e) {
  if (e.touches && e.touches.length > 0) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
  if (e.changedTouches && e.changedTouches.length > 0) return { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY };
  return { x: e.clientX, y: e.clientY };
}

function onDown(e) {
  if (e.type === 'touchstart') e.preventDefault();
  const p = getXY(e);
  isDragging = true;
  prevMouse.x = p.x; prevMouse.y = p.y;
  downPos.x = p.x; downPos.y = p.y;
  lastInteract = Date.now();
}

function onMove(e) {
  if (e.type === 'touchmove') e.preventDefault();
  const p = getXY(e);
  mouse.x = (p.x / window.innerWidth) * 2 - 1;
  mouse.y = -(p.y / window.innerHeight) * 2 + 1;
  if (isDragging) {
    rotVel.x = (p.y - prevMouse.y) * 0.004;
    rotVel.y = -(p.x - prevMouse.x) * 0.004;
    prevMouse.x = p.x; prevMouse.y = p.y;
    lastInteract = Date.now();
  }
}

function onUp(e) {
  if (!isDragging) return;
  isDragging = false;
  const p = getXY(e);
  // Tap detection — if finger barely moved, treat as click
  if (Math.hypot(p.x - downPos.x, p.y - downPos.y) < 15) {
    mouse.x = (p.x / window.innerWidth) * 2 - 1;
    mouse.y = -(p.y / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObjects(cardMeshes);
    if (hits.length) openModal(hits[0].object.userData);
  }
}

// Mouse events
renderer.domElement.addEventListener('mousedown', onDown);
document.addEventListener('mousemove', onMove);
document.addEventListener('mouseup', onUp);

// Touch events — on the canvas, non-passive so preventDefault works
renderer.domElement.addEventListener('touchstart', onDown, { passive: false });
renderer.domElement.addEventListener('touchmove', onMove, { passive: false });
renderer.domElement.addEventListener('touchend', onUp, { passive: false });
renderer.domElement.addEventListener('touchcancel', () => { isDragging = false; });

// ── Modal with embedded YouTube player ──
window.closeModal = function(e) {
  if (e) e.stopPropagation();
  document.getElementById('modal-overlay').classList.remove('active');
  document.getElementById('modal-iframe').src = '';
};

function openModal(data) {
  document.getElementById('modal-iframe').src = `https://www.youtube.com/embed/${data.videoId}?autoplay=1&rel=0`;
  document.getElementById('modal-title').textContent = data.title;
  document.getElementById('modal-overlay').classList.add('active');
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ── Resize ──
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ── Animate ──
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  starMat.uniforms.uTime.value = clock.getElapsedTime();

  const idle = Date.now() - lastInteract > 2500;
  if (idle && !isDragging) {
    rotVel.y += (autoSpeed - rotVel.y) * 0.02;
    rotVel.x *= 0.95;
  }
  globeGroup.rotation.x += rotVel.x;
  globeGroup.rotation.y += rotVel.y;
  if (!isDragging) { rotVel.x *= damping; rotVel.y *= damping; }

  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(cardMeshes);
  const newHover = hits.length ? hits[0].object : null;
  if (hoveredCard !== newHover) {
    if (hoveredCard) hoveredCard.userData.targetScale = 1.0;
    if (newHover) newHover.userData.targetScale = 1.12;
    hoveredCard = newHover;
    renderer.domElement.style.cursor = newHover ? 'pointer' : 'grab';
  }
  // Billboard: make each card face the camera using world quaternion
  const camQuat = camera.quaternion.clone();
  const parentWorldQuat = new THREE.Quaternion();
  cardGroup.getWorldQuaternion(parentWorldQuat);
  const parentInvQuat = parentWorldQuat.clone().invert();
  // Card's local quaternion = inverse(parent world quat) * camera quat
  // This cancels out the parent rotation so the card always faces camera
  const billboardLocalQuat = parentInvQuat.multiply(camQuat);

  cardMeshes.forEach(m => {
    const s = m.scale.x + (m.userData.targetScale - m.scale.x) * 0.12;
    m.scale.setScalar(s);
    m.quaternion.copy(billboardLocalQuat);
  });

  renderer.render(scene, camera);
}

// ── Init ──
async function init() {
  await buildCards();
  animate();
  setTimeout(() => {
    document.getElementById('loading').classList.add('fade-out');
    setTimeout(() => document.getElementById('loading').remove(), 800);
  }, 1500);
  setTimeout(() => document.getElementById('hint').classList.add('hidden'), 6000);
}
init();
</script>

<script>
(function(){
  var btn=document.querySelector('.scroll-to-top');
  window.addEventListener('scroll',function(){
    btn.classList.toggle('visible',window.scrollY>400);
  });
})();
</script>
