<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>RTS Schedule View — 2026-27</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f5f2;
      --panel: #ffffff;
      --ink: #272443;
      --ink-soft: #6b6883;
      --line: rgba(39, 36, 67, 0.12);
      --rt-red: #d63232;
      --rt-red-soft: #fbe6e3;
      --ft-blue: #2257a0;
      --ft-blue-soft: #e6efff;
      --hs-green: #2f7d3a;
      --hs-green-soft: #e0f3e3;
      --shadow: 0 1px 3px rgba(0,0,0,0.05), 0 4px 12px rgba(0,0,0,0.04);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); font-family: -apple-system, "Segoe UI", system-ui, sans-serif; font-size: 13px; line-height: 1.35; }

    .topbar { display: flex; align-items: center; justify-content: space-between; padding: 12px 18px; background: var(--panel); border-bottom: 1px solid var(--line); }
    .topbar h1 { margin: 0; font-size: 17px; font-weight: 700; }
    .topbar .meta { font-size: 12px; color: var(--ink-soft); display: flex; align-items: center; gap: 12px; }
    .topbar .refresh-btn { background: var(--rt-red); color: white; border: none; border-radius: 4px; padding: 6px 14px; font-size: 13px; font-weight: 600; cursor: pointer; }
    .topbar .refresh-btn:hover { background: #b82828; }
    .topbar .refresh-btn:disabled { opacity: 0.5; cursor: wait; }

    .filter-row { display: flex; gap: 8px; padding: 8px 18px; background: var(--panel); border-bottom: 1px solid var(--line); flex-wrap: wrap; align-items: center; }
    .filter-row .filter-label { font-size: 11px; color: var(--ink-soft); margin-right: 4px; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 700; }
    .chip { font-size: 12px; padding: 4px 10px; border-radius: 14px; background: rgba(0,0,0,0.06); color: var(--ink); border: 1px solid transparent; cursor: pointer; transition: background 0.15s, border-color 0.15s; font-weight: 600; }
    .chip:hover { background: rgba(0,0,0,0.1); }
    .chip.active { background: var(--ink); color: white; }
    .legend { display: inline-flex; gap: 12px; margin-left: 16px; align-items: center; font-size: 12px; color: var(--ink-soft); }
    .legend .sw { display: inline-block; width: 10px; height: 10px; border-radius: 2px; margin-right: 4px; vertical-align: middle; }

    .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; padding: 12px; }
    @media (max-width: 1100px) { .grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 700px) { .grid { grid-template-columns: 1fr; } }

    .day-col { display: flex; flex-direction: column; gap: 6px; }
    .day-head { font-size: 14px; font-weight: 800; text-align: center; padding: 6px 8px; background: var(--ink); color: white; border-radius: 4px; }

    .block {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px 10px;
      box-shadow: var(--shadow);
    }
    .block-head { display: flex; justify-content: space-between; align-items: baseline; border-bottom: 1px solid var(--line); padding-bottom: 4px; margin-bottom: 6px; }
    .block-head .block-time { font-size: 12px; font-weight: 700; color: var(--ink); letter-spacing: 0.04em; text-transform: uppercase; }
    .block-head .block-count { font-size: 11px; color: var(--ink-soft); font-weight: 700; }
    .block-head .block-note { font-size: 10px; color: var(--ink-soft); font-style: italic; }
    .block.all-day .block-head { background: linear-gradient(90deg, var(--ft-blue-soft), transparent); padding: 6px 6px 4px; margin: -8px -10px 6px; border-radius: 4px 4px 0 0; border-bottom: 1px solid var(--line); }

    .kid {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 3px 6px;
      margin-bottom: 2px;
      border-radius: 3px;
      font-size: 12px;
    }
    .kid.ft { background: var(--ft-blue-soft); color: var(--ft-blue); }
    .kid.hs { background: var(--hs-green-soft); color: var(--hs-green); }
    .kid .kid-name { font-weight: 600; }
    .kid .kid-meta { font-size: 11px; opacity: 0.85; }
    .kid .kid-gender { font-size: 11px; opacity: 0.7; margin-left: 4px; }
    .kid .stage-pill { font-size: 9px; padding: 1px 4px; border-radius: 6px; background: rgba(0,0,0,0.08); margin-left: 4px; }
    .kid.stage-inbox .stage-pill { background: #fff4d6; color: #b07b00; }
    .kid.stage-paid .stage-pill { background: var(--hs-green-soft); color: var(--hs-green); }
    .kid.stage-declined { opacity: 0.4; }

    .empty { font-size: 11px; font-style: italic; color: var(--ink-soft); text-align: center; padding: 6px 0; }

    .subgroup { margin-top: 4px; }
    .subgroup-head { font-size: 10px; font-weight: 800; letter-spacing: 0.05em; text-transform: uppercase; padding: 4px 6px; border-radius: 3px; margin: 4px 0 4px; display: flex; justify-content: space-between; align-items: baseline; }
    .subgroup-head.ft { background: var(--ft-blue); color: white; }
    .subgroup-head.hs { background: var(--hs-green); color: white; }
    .subgroup-count { font-weight: 600; opacity: 0.85; }

    .summary-bar { background: var(--panel); padding: 8px 18px; border-bottom: 1px solid var(--line); font-size: 12px; color: var(--ink-soft); display: flex; gap: 18px; }
    .summary-bar strong { color: var(--ink); font-weight: 700; }
    .error-banner { background: #fef0f0; border-left: 4px solid var(--rt-red); padding: 10px 14px; margin: 8px; font-size: 13px; color: var(--rt-red); }
  </style>
</head>
<body>

<div class="topbar">
  <h1>River Tech School — 2026–27 Schedule View</h1>
  <div class="meta">
    <span id="meta-line">Loading…</span>
    <button id="refresh-btn" class="refresh-btn" onclick="loadAll()">Refresh</button>
  </div>
</div>

<div class="filter-row">
  <span class="filter-label">Age group</span>
  <button class="chip active" data-age="all">All</button>
  <button class="chip" data-age="younger">9 and under</button>
  <button class="chip" data-age="older">10 and up</button>
  <span class="legend">
    <span><span class="sw" style="background:var(--ft-blue);"></span> Full-time</span>
    <span><span class="sw" style="background:var(--hs-green);"></span> Homeschool</span>
  </span>
</div>

<div id="summary-bar" class="summary-bar"></div>

<div id="grid-root">
  <div style="padding: 30px; text-align: center; color: var(--ink-soft);">Loading registrations…</div>
</div>

<script>
  // ===== Configuration ===================================================
  const PIPELINE_TOKEN = "8ff4851af82ed79c4a3b75ff454b12172c67fac5fbdfffb9";
  const BACKENDS = {
    "full-time":     "https://script.google.com/macros/s/AKfycbwggeLDK4kzV0HOXXhfqW7aX2ow5zUZwuOpET8RmXuZCOhmiWSGP-OSPrrH9ouqkZxC/exec",
    "homeschool":    "https://script.google.com/macros/s/AKfycbxbZ8U_EhvQTJLrXLLo1EsS45grDHTtCRnOJbU_Di_o16Rc4bJSSV0Kf3yTOQk9dbEUDQ/exec",
    "re-enrollment": "https://script.google.com/macros/s/AKfycbz7duCV6kqLV8brjz0ujhgsoqY7LOMW7501hjUg_oX42xykAZ-6NSY8I_kBzx93fcO1/exec"
  };
  // Major → days mapping (from register-school-2026-27.js)
  const MAJOR_DAYS = {
    "performing-arts": ["Mon","Tue","Wed","Thu"],          // PA Major: Mon–Thu (4d)
    "technology":      ["Tue","Wed","Thu","Fri"],          // Tech Major: Tue–Fri (4d)
    "double-major":    ["Mon","Tue","Wed","Thu","Fri"]     // Double: Mon–Fri (5d)
  };
  const DAYS_ORDER = ["Mon","Tue","Wed","Thu","Fri"];
  const SEP1 = new Date("2026-09-01T00:00:00");

  // ===== State ============================================================
  let KIDS = [];
  let AGE_FILTER = "all"; // all | younger (≤9) | older (≥10)
  let lastAutoRefreshAt = Date.now();

  // ===== Boot =============================================================
  loadAll();
  document.addEventListener("visibilitychange", () => {
    if (document.visibilityState !== "visible") return;
    if (Date.now() - lastAutoRefreshAt < 60_000) return;
    lastAutoRefreshAt = Date.now();
    loadAll();
  });
  document.querySelectorAll(".chip[data-age]").forEach(b => {
    b.onclick = () => {
      AGE_FILTER = b.dataset.age;
      document.querySelectorAll(".chip[data-age]").forEach(x => x.classList.toggle("active", x.dataset.age === AGE_FILTER));
      render();
    };
  });

  // ===== Helpers ==========================================================
  function normalizeMajor(s) {
    if (!s) return null;
    const t = String(s).toLowerCase().trim().replace(/\s+major$/, "").replace(/\s+/g, "-");
    if (t === "performing-arts" || t === "technology" || t === "double-major") return t;
    return null;
  }

  function parseHomeschoolDays(s) {
    if (!s) return [];
    const lower = String(s).toLowerCase();
    const days = [];
    if (/\bmonday\b/.test(lower))   days.push("Mon");
    if (/\btuesday\b/.test(lower))  days.push("Tue");
    // Wednesday is intentionally not a homeschool option per the a-la-carte schedule.
    if (/\bthursday\b/.test(lower)) days.push("Thu");
    if (/\bfriday\b/.test(lower))   days.push("Fri");
    return days;
  }

  function ageOn(dob, ref) {
    if (!dob) return null;
    const b = new Date(dob);
    if (isNaN(b.getTime())) return null;
    let age = ref.getFullYear() - b.getFullYear();
    if (ref.getMonth() < b.getMonth() ||
        (ref.getMonth() === b.getMonth() && ref.getDate() < b.getDate())) age--;
    return age;
  }

  function genderEmoji(g) {
    const s = String(g || "").toLowerCase();
    if (s.startsWith("m")) return "♂";
    if (s.startsWith("f")) return "♀";
    return "";
  }

  function displayName(name, preferred) {
    if (preferred && preferred.trim()) {
      const p = preferred.trim();
      // Just first part if it's a multi-word preferred like "Charlotte or Charlie"
      const m = p.match(/^([A-Za-z]+(?:[\-' ]?[A-Za-z]+)*)/);
      return (m ? m[1] : p);
    }
    if (!name) return "(unnamed)";
    return String(name).split(/\s+/)[0]; // first name only
  }

  function escapeHtml(s) {
    return String(s == null ? "" : s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"})[c]);
  }

  // ===== Data fetching ====================================================
  async function loadAll() {
    const refreshBtn = document.getElementById("refresh-btn");
    refreshBtn.disabled = true;
    const meta = document.getElementById("meta-line");
    meta.textContent = "Refreshing…";
    try {
      const results = await Promise.all(Object.keys(BACKENDS).map(src =>
        fetch(`${BACKENDS[src]}?action=list&token=${encodeURIComponent(PIPELINE_TOKEN)}`)
          .then(r => r.json())
          .then(d => ({ src, ok: d.ok, headers: d.headers || [], rows: d.rows || [], error: d.error }))
      ));
      const errs = results.filter(r => !r.ok);
      if (errs.length) throw new Error("Backend errors: " + errs.map(e => `${e.src}: ${e.error}`).join("; "));
      KIDS = buildRoster(results);
      const now = new Date().toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" });
      meta.textContent = `${KIDS.length} students · refreshed ${now}`;
      render();
    } catch (err) {
      meta.textContent = "Error";
      document.getElementById("grid-root").innerHTML =
        `<div class="error-banner">Failed to load: ${escapeHtml(err.message)}</div>`;
      console.error(err);
    } finally {
      refreshBtn.disabled = false;
    }
  }

  function buildRoster(results) {
    const all = [];
    for (const { src, headers, rows } of results) {
      const idx = (n) => headers.indexOf(n);
      for (const row of rows) {
        if (!row[0]) continue;
        const rawStage = String(row[idx("Pipeline Stage")] || "Inbox");
        // Skip declined for the schedule view (they're not coming)
        if (/declined/i.test(rawStage)) continue;
        const stage = rawStage === "Paid" ? "Inbox-Paid" : rawStage;

        const parent = `${row[idx("Parent 1 First")] || ""} ${row[idx("Parent 1 Last")] || ""}`.trim();
        for (let n = 1; n <= 6; n++) {
          const name = row[idx(`Child ${n} Name`)];
          if (!name) continue;
          const dob = row[idx(`Child ${n} DOB`)];
          const gender = row[idx(`Child ${n} Gender`)];
          const grade = row[idx(`Child ${n} Grade`)];
          const preferred = row[idx(`Child ${n} Preferred Name`)];

          let days = [];
          let type = "";
          let major = null;
          if (src === "homeschool") {
            type = "hs";
            days = parseHomeschoolDays(row[idx(`Child ${n} Programs`)]);
          } else {
            type = "ft";
            major = normalizeMajor(row[idx(`Child ${n} Schedule`)]);
            days = MAJOR_DAYS[major] || [];
          }

          all.push({
            source: src,
            type,
            name: String(name).trim(),
            preferred,
            display: displayName(name, preferred),
            dob,
            age: ageOn(dob, SEP1),
            gender,
            grade,
            major,
            days,
            stage,
            parent,
            regId: row[idx("Registration ID")] || row[0]
          });
        }
      }
    }
    // Sort: youngest first, then alphabetical name
    all.sort((a,b) => {
      const ag = (a.age == null ? 999 : a.age) - (b.age == null ? 999 : b.age);
      if (ag) return ag;
      return a.display.localeCompare(b.display);
    });
    return all;
  }

  // ===== Render ===========================================================
  function ageFilterMatches(k) {
    if (AGE_FILTER === "all") return true;
    if (k.age == null) return true;
    if (AGE_FILTER === "younger") return k.age <= 9;
    if (AGE_FILTER === "older") return k.age >= 10;
    return true;
  }

  function renderSummary() {
    const visible = KIDS.filter(ageFilterMatches);
    const ft = visible.filter(k => k.type === "ft").length;
    const hs = visible.filter(k => k.type === "hs").length;
    const inbox = visible.filter(k => /inbox/i.test(k.stage)).length;
    const decided = visible.filter(k => /decided/i.test(k.stage)).length;
    document.getElementById("summary-bar").innerHTML =
      `<span><strong>${visible.length}</strong> students total</span>` +
      `<span><strong style="color:var(--ft-blue)">${ft}</strong> full-time</span>` +
      `<span><strong style="color:var(--hs-green)">${hs}</strong> homeschool</span>` +
      `<span>Stages: <strong>${decided}</strong> decided · <strong>${inbox}</strong> inbox</span>`;
  }

  function kidPill(k) {
    const stageCls = k.stage === "Inbox-Paid" ? "stage-paid" : (/inbox/i.test(k.stage) ? "stage-inbox" : "");
    const stagePillTxt = k.stage === "Inbox-Paid" ? "$" : (/inbox/i.test(k.stage) ? "?" : "");
    const stagePillHtml = stagePillTxt ? `<span class="stage-pill" title="${escapeHtml(k.stage)}">${stagePillTxt}</span>` : "";
    return `<div class="kid ${k.type} ${stageCls}">
      <span><span class="kid-name">${escapeHtml(k.display)}</span><span class="kid-gender">${genderEmoji(k.gender)}</span>${stagePillHtml}</span>
      <span class="kid-meta">${k.age == null ? "?" : k.age}</span>
    </div>`;
  }

  function block(day, period) {
    // period: "morning" (full-time only, 8:30-10:30), "afternoon" (full-time + HS, 10:30+), "all-day" (Wed full-time only)
    const allDayKids = KIDS.filter(k => k.days.includes(day) && ageFilterMatches(k));
    const ftKids = allDayKids.filter(k => k.type === "ft");
    const hsKids = allDayKids.filter(k => k.type === "hs");

    const time = period === "morning" ? "8:30 – 10:30" :
                 period === "all-day" ? "All day" : "10:30 onward";
    const note = period === "morning" ? "Full-timers only" :
                 period === "all-day" ? "Full-timers only (no a-la-carte)" : "Full-time + a-la-carte side by side";
    const cls = "block" + (period === "all-day" ? " all-day" : "");

    let body = "";
    if (period === "morning" || period === "all-day") {
      // Full-time only
      body = ftKids.length === 0
        ? `<div class="empty">— no one —</div>`
        : ftKids.map(kidPill).join("");
    } else {
      // 10:30 onward: show two clearly separated subgroups
      body += `<div class="subgroup"><div class="subgroup-head ft"><span>Full-time</span><span class="subgroup-count">${ftKids.length}</span></div>`;
      body += ftKids.length === 0 ? `<div class="empty">— none —</div>` : ftKids.map(kidPill).join("");
      body += `</div>`;
      body += `<div class="subgroup"><div class="subgroup-head hs"><span>Homeschool</span><span class="subgroup-count">${hsKids.length}</span></div>`;
      body += hsKids.length === 0 ? `<div class="empty">— no a-la-carte today —</div>` : hsKids.map(kidPill).join("");
      body += `</div>`;
    }

    const totalCount = (period === "morning" || period === "all-day") ? ftKids.length : (ftKids.length + hsKids.length);
    return `<div class="${cls}">
      <div class="block-head">
        <span>
          <span class="block-time">${time}</span>
          <span class="block-note"> · ${escapeHtml(note)}</span>
        </span>
        <span class="block-count">${totalCount}</span>
      </div>
      ${body}
    </div>`;
  }

  function render() {
    renderSummary();
    const root = document.getElementById("grid-root");
    root.innerHTML = "";
    const grid = document.createElement("div");
    grid.className = "grid";
    for (const day of DAYS_ORDER) {
      const col = document.createElement("div");
      col.className = "day-col";
      const dayLabel = { "Mon":"Monday","Tue":"Tuesday","Wed":"Wednesday","Thu":"Thursday","Fri":"Friday" }[day];
      let inner = `<div class="day-head">${dayLabel}</div>`;
      if (day === "Wed") {
        inner += block(day, "all-day");
      } else {
        inner += block(day, "morning");
        inner += block(day, "afternoon");
      }
      col.innerHTML = inner;
      grid.appendChild(col);
    }
    root.appendChild(grid);
  }
</script>
</body>
</html>
